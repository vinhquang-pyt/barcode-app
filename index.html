<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quét Barcode</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#0f1115;
    --card:#1a1d24;
    --accent:#3b82f6;
    --accent-dark:#2563eb;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#e5e7eb;
    --text-dim:#9ca3af;
    --border:#2a2d36;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .header{
    padding:16px 16px 8px;
    text-align:center;
  }
  .header h1{
    font-size:20px;
    margin:0;
    font-weight:600;
  }
  .status-bar{
    text-align:center;
    font-size:13px;
    color:var(--text-dim);
    padding:4px 16px 12px;
  }
  .container{
    padding:0 16px 16px;
    max-width:480px;
    margin:0 auto;
  }
  #reader{
    width:100%;
    border-radius:16px;
    overflow:hidden;
    background:#000;
    border:1px solid var(--border);
  }
  #reader video{
    border-radius:16px;
  }
  .camera-controls{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .btn-control{
    flex:1;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 8px;
    border-radius:10px;
    font-size:13px;
  }
  .btn-control:active{
    background:#22252e;
  }
  .btn-control.active{
    border-color:var(--accent);
    color:var(--accent);
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    margin-top:14px;
  }
  .manual-row{
    display:flex;
    gap:8px;
  }
  input[type="text"]{
    flex:1;
    background:#0f1115;
    border:1px solid var(--border);
    color:var(--text);
    border-radius:10px;
    padding:12px 14px;
    font-size:16px;
    outline:none;
  }
  input[type="text"]:focus{
    border-color:var(--accent);
  }
  button{
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary{
    background:var(--accent);
    color:white;
    padding:12px 18px;
  }
  .btn-primary:active{
    background:var(--accent-dark);
  }
  .btn-secondary{
    width:100%;
    background:transparent;
    border:1px solid var(--border);
    color:var(--text);
    padding:12px;
    margin-top:10px;
  }
  .section-label{
    font-size:13px;
    color:var(--text-dim);
    margin-bottom:8px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.03em;
  }
  .last-scan{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .last-scan-code{
    font-size:17px;
    font-weight:600;
    word-break:break-all;
  }
  .last-scan-time{
    font-size:12px;
    color:var(--text-dim);
    margin-top:2px;
  }
  .badge{
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
    white-space:nowrap;
  }
  .badge-ok{
    background:rgba(34,197,94,0.15);
    color:var(--success);
  }
  .badge-pending{
    background:rgba(156,163,175,0.15);
    color:var(--text-dim);
  }
  .badge-error{
    background:rgba(239,68,68,0.15);
    color:var(--danger);
  }
  .history{
    margin-top:14px;
    max-height:220px;
    overflow-y:auto;
  }
  .history-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--border);
    font-size:14px;
    gap:8px;
  }
  .history-item:last-child{
    border-bottom:none;
  }
  .history-code{
    word-break:break-all;
  }
  .history-time{
    color:var(--text-dim);
    font-size:12px;
    white-space:nowrap;
  }
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    padding:12px 20px;
    border-radius:12px;
    font-size:14px;
    opacity:0;
    transition:all 0.25s ease;
    pointer-events:none;
    z-index:999;
    max-width:90%;
    text-align:center;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .toast.success{ border-color: var(--success); }
  .toast.error{ border-color: var(--danger); }
  .config-warning{
    background:rgba(239,68,68,0.1);
    border:1px solid var(--danger);
    border-radius:12px;
    padding:12px 14px;
    font-size:13px;
    margin-bottom:14px;
    color:#fca5a5;
  }
  .config-warning code{
    background:rgba(255,255,255,0.08);
    padding:2px 6px;
    border-radius:6px;
    font-size:12px;
  }
  .empty-history{
    color:var(--text-dim);
    font-size:14px;
    text-align:center;
    padding:12px 0;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📷 Quét Barcode</h1>
</div>
<div class="status-bar" id="statusBar">Đang khởi động camera...</div>

<div class="container">

  <div id="configWarning" class="config-warning" style="display:none;">
    ⚠️ Chưa cấu hình URL Google Apps Script. Mở file <code>app.js</code> và điền giá trị vào biến <code>SCRIPT_URL</code> ở đầu file.
  </div>

  <div id="reader"></div>

  <div class="camera-controls" id="cameraControls" style="display:none;">
    <button class="btn-control" id="zoomOutBtn">➖ Zoom</button>
    <button class="btn-control" id="zoomInBtn">➕ Zoom</button>
    <button class="btn-control" id="torchBtn">💡 Đèn flash</button>
  </div>

  <div class="card">
    <div class="section-label">Nhập tay (khi không quét được)</div>
    <div class="manual-row">
      <input type="text" id="manualInput" placeholder="Nhập mã barcode..." inputmode="text" autocomplete="off">
      <button class="btn-primary" id="manualSubmit">Gửi</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Lần quét gần nhất</div>
    <div class="last-scan">
      <div>
        <div class="last-scan-code" id="lastCode">—</div>
        <div class="last-scan-time" id="lastTime">Chưa có mã nào</div>
      </div>
      <div class="badge badge-pending" id="lastBadge">—</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Lịch sử quét (phiên này)</div>
    <div class="history" id="historyList">
      <div class="empty-history">Chưa có mã nào được quét</div>
    </div>
    <button class="btn-secondary" id="clearHistoryBtn">Xóa lịch sử hiển thị</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="app.js"></script>
</body>
</html>
